{{ $slug := .File.ContentBaseName }}
{{ $audioPath := printf "/audio/%s.mp3" $slug }}
{{ $audioFile := printf "static/audio/%s.mp3" $slug }}
{{ if (fileExists $audioFile) }}
<div class="audio-player" style="margin: 1.5rem 0; padding: 1rem; border: 1px solid var(--accent); border-radius: 4px;">
  <div style="display: flex; align-items: center; gap: 0.75rem;">
    <span style="color: var(--accent); font-weight: bold; white-space: nowrap;">&#9655; Listen to this post</span>
    <audio controls preload="none" style="width: 100%; height: 36px;">
      <source src="{{ $audioPath }}" type="audio/mpeg">
    </audio>
  </div>
  <div style="font-size: 0.75rem; color: #666; margin-top: 0.4rem;">Narrated by Lazer (ElevenLabs TTS)</div>
</div>
{{ end }}
